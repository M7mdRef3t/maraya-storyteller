substitutions:
  _SERVICE_NAME: maraya-storyteller
  _REGION: europe-west1
  _GEMINI_TEXT_MODEL: gemini-2.5-flash

steps:
  # Build the container image from project root (multi-stage: builds client + server)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}', '-f', 'server/Dockerfile', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-env-vars'
      - 'GEMINI_TEXT_MODEL=${_GEMINI_TEXT_MODEL}'
      - '--port'
      - '8080'
      - '--timeout'
      - '900'
      - '--session-affinity'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
